
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>PRIVATE BOUNDARY BUILD</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="75 Hard" />
  <meta name="mobile-web-app-capable" content="yes" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgb(241 245 249);
    }
    body {
      overscroll-behavior-y: auto;
      -webkit-tap-highlight-color: transparent;
    }
    #root {
      width: 100%;
      min-height: 100%;
    }
    input, button, textarea, select {
      font: inherit;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_KEY = '75hard_dashboard_test_v1';

    const GROUPS = [
      {
        id: 'dailyChecklist',
        title: 'Daily Checklist',
        color: 'border-slate-200 bg-slate-50',
        items: [
          { id: 'reading', title: '10 pages self-help read', type: 'singleRow' },
          { id: 'progressPic', title: 'Daily progress pic', type: 'singleRow' },
          { id: 'language', title: 'Mandarin or Spanish', type: 'singleRow', subtitle: '15+ min total' },
          { id: 'music', title: 'Music practice', type: 'singleRow', subtitle: '30+ min total' },
          { id: 'coldShower', title: 'Cold shower', type: 'singleRow', subtitle: '2+ min at end' },
          { id: 'callFriend', title: 'Call a friend', type: 'singleRow', subtitle: '15+ min' },
          { id: 'callDad', title: 'Call dad', type: 'singleRow', subtitle: '5+ min' },
        ],
      },
    ];

    const END_OF_DAY_IDS = new Set([
      'noCheatMeals',
      'noAlcohol',
      'privateBoundary',
      'noMarijuana',
    ]);

    function todayString() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function isWeekend(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay();
      return day === 0 || day === 6;
    }

    function workTarget(dateStr) {
      return isWeekend(dateStr) ? 3 : 8;
    }

    function createBlankTasks(dateStr) {
      return {
        water: [false, false, false, false, false],
        noCheatMeals: false,
        noAlcohol: false,
        reading: false,
        progressPic: false,
        language: false,
        music: false,
        coldShower: false,
        callFriend: false,
        callDad: false,
        privateBoundary: false,
        noMarijuana: false,
        workouts: [
          { done: false, outside: false },
          { done: false, outside: false },
        ],
        workoutsNotBackToBack: false,
        workHours: Array.from({ length: 8 }, () => false),
      };
    }

    function normalizeTasksForDate(tasks, dateStr) {
      const current = Array.isArray(tasks?.workHours) ? tasks.workHours : [];
      const workHours = Array.from({ length: 8 }, (_, i) => Boolean(current[i]));
      return {
        ...createBlankTasks(dateStr),
        ...tasks,
        workHours,
      };
    }

    function defaultData() {
      const date = todayString();
      return {
        activeDay: date,
        logs: {
          [date]: {
            date,
            tasks: createBlankTasks(date),
            notes: '',
            failed: false,
          },
        },
        history: [],
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultData();
        const parsed = JSON.parse(raw);
        const date = parsed.activeDay || todayString();
        const logs = parsed.logs || {};
        const existing = logs[date] || { date, tasks: createBlankTasks(date), notes: '', failed: false };
        return {
          activeDay: date,
          logs: {
            ...logs,
            [date]: {
              ...existing,
              tasks: normalizeTasksForDate(existing.tasks, date),
            },
          },
          history: Array.isArray(parsed.history) ? parsed.history : [],
        };
      } catch (e) {
        return defaultData();
      }
    }

    function isArrayComplete(arr) {
      return Array.isArray(arr) && arr.length > 0 && arr.every(Boolean);
    }

    function areWorkoutsComplete(workouts) {
      return Array.isArray(workouts) && workouts.every(w => w.done) && workouts.some(w => w.outside);
    }

    function isTaskComplete(id, value, dateStr) {
      if (id === 'water') return isArrayComplete(value);
      if (id === 'workHours') {
        const required = workTarget(dateStr);
        return Array.isArray(value) && value.slice(0, required).every(Boolean);
      }
      if (id === 'workouts') return areWorkoutsComplete(value);
      return value === true;
    }

    function completionCounts(tasks, dateStr) {
      const allIds = [
        'water', 'noCheatMeals', 'noAlcohol', 'reading', 'progressPic',
        'language', 'music', 'coldShower', 'callFriend', 'callDad',
        'privateBoundary', 'noMarijuana', 'workouts', 'workoutsNotBackToBack', 'workHours'
      ];
      const done = allIds.filter(id => isTaskComplete(id, tasks[id], dateStr)).length;
      return { done, total: allIds.length, percent: Math.round((done / allIds.length) * 100) };
    }


    function ActionBox({ checked, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full rounded-md border px-1 py-2 text-[8px] font-semibold leading-tight transition ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
        >
          {label}
        </button>
      );
    }

    function MultiBoxItem({ title, boxes, boxLabel, values, onToggle }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-1 mb-1">
            <div>
              <div className="font-semibold text-[11px] leading-tight">{title}</div>
              <div className="text-[9px] text-slate-500 leading-tight">{boxLabel}</div>
            </div>
            <div className="text-[9px] font-medium text-slate-500">{values.filter(Boolean).length}/{boxes}</div>
          </div>
          <div className={`grid gap-1 ${boxes <= 5 ? 'grid-cols-5' : 'grid-cols-4'}`}>
            {values.map((checked, idx) => (
              <button
                key={idx}
                onClick={() => onToggle(idx)}
                className={`rounded-md px-1 py-2 text-[9px] font-bold border ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
              >
                {idx + 1}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function WorkoutItem({ workouts, notBackToBack, onToggleDone, onToggleOutside, onToggleNotBackToBack }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-2 mb-1">
            <div>
              <div className="font-semibold text-[11px] leading-tight">Workout Tracking</div>
              <div className="text-[9px] text-slate-500 leading-tight">2 x 2 grid</div>
            </div>
            <div className="shrink-0 w-20">
              <ActionBox
                checked={notBackToBack}
                label={notBackToBack ? 'Spaced' : 'Spacing'}
                onClick={onToggleNotBackToBack}
              />
            </div>
          </div>
          <div className="grid grid-cols-2 gap-1">
            <ActionBox
              checked={workouts[0].done}
              label="Workout 1"
              onClick={() => onToggleDone(0)}
            />
            <ActionBox
              checked={workouts[1].done}
              label="Workout 2"
              onClick={() => onToggleDone(1)}
            />
            <ActionBox
              checked={workouts[0].outside}
              label="Outside 1"
              onClick={() => onToggleOutside(0)}
            />
            <ActionBox
              checked={workouts[1].outside}
              label="Outside 2"
              onClick={() => onToggleOutside(1)}
            />
          </div>
        </div>
      );
    }

    function GuardrailsGrid({ tasks, onToggle }) {
      const items = [
        { id: 'noCheatMeals', title: 'No cheat meals' },
        { id: 'noAlcohol', title: 'No alcohol' },
        { id: 'privateBoundary', title: 'Private boundary' },
        { id: 'noMarijuana', title: 'No marijuana' },
      ];

      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="mb-1">
            <div className="font-semibold text-[11px] leading-tight">Daily Guardrails</div>
            <div className="text-[9px] text-slate-500 leading-tight">2 x 2</div>
          </div>
          <div className="grid grid-cols-2 gap-1">
            {items.map(item => (
              <ActionBox
                key={item.id}
                checked={tasks[item.id]}
                label={item.title}
                onClick={() => onToggle(item.id)}
              />
            ))}
          </div>
        </div>
      );
    }

    function WorkBlocksGrid({ values, weekend, onToggle }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-1 mb-1">
            <div>
              <div className="font-semibold text-[11px] leading-tight">Work Blocks</div>
              <div className="text-[9px] text-slate-500 leading-tight">4 across, 2 down</div>
            </div>
            <div className="text-[9px] font-medium text-slate-500">{weekend ? 'Weekend' : 'Weekday'}</div>
          </div>
          <div className="grid grid-cols-4 gap-1">
            {values.map((checked, idx) => {
              const disabled = weekend && idx >= 3;
              return (
                <button
                  key={idx}
                  onClick={() => !disabled && onToggle(idx)}
                  className={`rounded-md px-1 py-2 text-[9px] font-bold border ${disabled ? 'bg-slate-200 border-slate-200 text-slate-400 cursor-not-allowed' : checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
                >
                  {idx + 1}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function SingleItem({ title, checked, subtitle, onClick }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-2">
            <div className="min-w-0 pr-2">
              <div className="font-semibold text-[11px] leading-tight">{title}</div>
              {subtitle ? <div className="text-[9px] text-slate-500 leading-tight">{subtitle}</div> : null}
            </div>
            <div className="shrink-0 w-16">
              <ActionBox checked={checked} label={checked ? 'Done' : 'Open'} onClick={onClick} />
            </div>
          </div>
        </div>
      );
    }

    function GroupCard({ group, children }) {
      return (
        <section className={`rounded-xl border p-1.5 shadow-sm ${group.color}`}>
          <div className="mb-1">
            <h2 className="text-[12px] font-bold leading-tight">{group.title}</h2>
          </div>
          <div className="space-y-1">{children}</div>
        </section>
      );
    }

    function App() {
      const [data, setData] = useState(loadData);
      const activeDate = data.activeDay;
      const log = data.logs[activeDate] || { date: activeDate, tasks: createBlankTasks(activeDate), notes: '', failed: false };
      const tasks = useMemo(() => normalizeTasksForDate(log.tasks, activeDate), [log.tasks, activeDate]);
      const stats = completionCounts(tasks, activeDate);
      const weekend = isWeekend(activeDate);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, [data]);

      function updateCurrentLog(updater) {
        setData(prev => {
          const currentDate = prev.activeDay;
          const currentLog = prev.logs[currentDate] || { date: currentDate, tasks: createBlankTasks(currentDate), notes: '', failed: false };
          const nextLog = updater({
            ...currentLog,
            tasks: normalizeTasksForDate(currentLog.tasks, currentDate),
          });
          return {
            ...prev,
            logs: {
              ...prev.logs,
              [currentDate]: nextLog,
            },
          };
        });
      }

      function toggleArrayItem(id, index) {
        updateCurrentLog(current => {
          const next = [...current.tasks[id]];
          next[index] = !next[index];
          return {
            ...current,
            tasks: {
              ...current.tasks,
              [id]: next,
            },
          };
        });
      }

      function toggleSingle(id) {
        updateCurrentLog(current => ({
          ...current,
          tasks: {
            ...current.tasks,
            [id]: !current.tasks[id],
          },
        }));
      }

      function toggleWorkoutDone(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, done: !w.done } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function toggleWorkoutOutside(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, outside: !w.outside } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function changeDay(delta) {
        setData(prev => {
          const base = new Date(prev.activeDay + 'T12:00:00');
          base.setDate(base.getDate() + delta);
          const nextDate = base.toISOString().slice(0, 10);
          const existing = prev.logs[nextDate];
          return {
            ...prev,
            activeDay: nextDate,
            logs: {
              ...prev.logs,
              [nextDate]: existing || {
                date: nextDate,
                tasks: createBlankTasks(nextDate),
                notes: '',
                failed: false,
              },
            },
          };
        });
      }

      function setManualDate(value) {
        if (!value) return;
        setData(prev => ({
          ...prev,
          activeDay: value,
          logs: {
            ...prev.logs,
            [value]: prev.logs[value] || {
              date: value,
              tasks: createBlankTasks(value),
              notes: '',
              failed: false,
            },
          },
        }));
      }

      function markFailed() {
        const ok = window.confirm('Confirm failure for this day? This is honor-code based and should only be used if you really failed.');
        if (!ok) return;
        updateCurrentLog(current => ({ ...current, failed: true }));
      }

      function unmarkFailed() {
        updateCurrentLog(current => ({ ...current, failed: false }));
      }

      function startNewDay() {
        const ok = window.confirm('Start a new day? This will move you to the next day but will not auto-reset anything.');
        if (!ok) return;
        changeDay(1);
      }

      function clearAll() {
        const ok = window.confirm('Clear all local tracker data?');
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEY);
        setData(defaultData());
      }


      return (
        <div className="w-full min-h-screen bg-slate-100 p-1.5 space-y-1.5 overflow-y-auto">
          <header className="rounded-xl bg-slate-900 text-white p-2 shadow-sm">
            <div className="flex flex-col gap-1">
              <div>
                <h1 className="text-[13px] font-bold tracking-tight">PRIVATE BOUNDARY BUILD</h1>
                <p className="text-[9px] text-slate-300 mt-0.5">Tiny portrait dashboard. Phone can scroll if needed.</p>
              </div>
              <div className="grid grid-cols-5 gap-1">
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Date</div>
                  <div className="font-semibold text-[10px] mt-0.5 break-all">{activeDate}</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Type</div>
                  <div className="font-semibold text-[10px] mt-0.5">{weekend ? 'Weekend' : 'Weekday'}</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Work</div>
                  <div className="font-semibold text-[10px] mt-0.5">{workTarget(activeDate)} hr</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Done</div>
                  <div className="font-semibold text-[10px] mt-0.5">{stats.done}/{stats.total}</div>
                </div>
                <div className={`rounded-lg px-1.5 py-1.5 ${log.failed ? 'bg-red-700' : 'bg-slate-800'}`}>
                  <div className="text-[8px] text-slate-300">Status</div>
                  <div className="font-semibold text-[10px] mt-0.5">{log.failed ? 'Failed' : `${stats.percent}%`}</div>
                </div>
              </div>
            </div>
          </header>

          <section className="rounded-xl bg-white p-2 shadow-sm">
            <div className="grid grid-cols-4 gap-1 items-center">
              <button onClick={() => changeDay(-1)} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Prev</button>
              <button onClick={() => setManualDate(todayString())} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Today</button>
              <button onClick={() => changeDay(1)} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Next</button>
              <input type="date" value={activeDate} onChange={(e) => setManualDate(e.target.value)} className="rounded-md border border-slate-300 px-1.5 py-1.5 text-[9px] w-full min-w-0" />
            </div>
            <div className="grid grid-cols-3 gap-1 mt-1">
              <button onClick={startNewDay} className="rounded-md bg-blue-600 text-white px-2 py-1.5 text-[9px] font-semibold">New Day</button>
              <button onClick={log.failed ? unmarkFailed : markFailed} className={`rounded-md px-2 py-1.5 text-[9px] font-semibold text-white ${log.failed ? 'bg-emerald-600' : 'bg-red-600'}`}>
                {log.failed ? 'Unfail' : 'Fail'}
              </button>
              <button onClick={clearAll} className="rounded-md bg-slate-900 text-white px-2 py-1.5 text-[9px] font-semibold">Clear</button>
            </div>
            <div className="mt-1 text-[9px] text-slate-600">
              Layout: checklist on left, blocks on right
            </div>
          </section>

          <main className="grid grid-cols-3 gap-1.5 items-start">
            <section className="col-span-1 rounded-xl border border-slate-200 bg-slate-50 p-1.5 shadow-sm">
              <div className="mb-1">
                <h2 className="text-[12px] font-bold leading-tight">Daily Checklist</h2>
                <p className="text-[9px] text-slate-500 leading-tight">7 rows</p>
              </div>
              <div className="space-y-1">
                {GROUPS[0].items.map(item => (
                  <SingleItem
                    key={item.id}
                    title={item.title}
                    subtitle={item.subtitle || ''}
                    checked={tasks[item.id]}
                    onClick={() => toggleSingle(item.id)}
                  />
                ))}
              </div>
            </section>

            <section className="col-span-2 grid grid-cols-1 gap-1.5">
              <div className="rounded-xl border border-blue-200 bg-blue-50 p-1.5 shadow-sm">
                <div className="mb-1">
                  <h2 className="text-[12px] font-bold leading-tight">Hydration</h2>
                </div>
                <MultiBoxItem
                  title="Water"
                  boxes={5}
                  boxLabel=".8L each"
                  values={tasks.water}
                  onToggle={(idx) => toggleArrayItem('water', idx)}
                />
              </div>

              <div className="rounded-xl border border-cyan-200 bg-cyan-50 p-1.5 shadow-sm">
                <WorkBlocksGrid
                  values={tasks.workHours}
                  weekend={weekend}
                  onToggle={(idx) => toggleArrayItem('workHours', idx)}
                />
              </div>

              <div className="rounded-xl border border-rose-200 bg-rose-50 p-1.5 shadow-sm">
                <GuardrailsGrid tasks={tasks} onToggle={toggleSingle} />
              </div>

              <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-1.5 shadow-sm">
                <WorkoutItem
                  workouts={tasks.workouts}
                  notBackToBack={tasks.workoutsNotBackToBack}
                  onToggleDone={toggleWorkoutDone}
                  onToggleOutside={toggleWorkoutOutside}
                  onToggleNotBackToBack={() => toggleSingle('workoutsNotBackToBack')}
                />
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
