
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>75 Hard Tracker Test Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="75 Hard" />
  <meta name="mobile-web-app-capable" content="yes" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    #root {
      width: 100%;
      height: 100%;
    }
    input, button, textarea, select {
      font: inherit;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_KEY = '75hard_dashboard_test_v1';

    const GROUPS = [
      {
        id: 'core',
        title: 'Core 75 Hard',
        color: 'border-blue-200 bg-blue-50',
        items: [
          { id: 'water', title: 'Water', type: 'multi', boxes: 5, boxLabel: '.8L each' },
          { id: 'noCheatMeals', title: 'No cheat meals', type: 'single' },
          { id: 'noAlcohol', title: 'No alcohol', type: 'single' },
          { id: 'reading', title: '10 pages self-help read', type: 'single' },
          { id: 'progressPic', title: 'Daily progress pic', type: 'single' },
        ],
      },
      {
        id: 'training',
        title: 'Practice / Training Blocks',
        color: 'border-purple-200 bg-purple-50',
        items: [
          { id: 'language', title: 'Mandarin or Spanish', type: 'multi', boxes: 3, boxLabel: '5 min each' },
          { id: 'music', title: 'Music practice', type: 'multi', boxes: 3, boxLabel: '10 min each' },
          { id: 'coldShower', title: 'Cold shower (2+ min at end)', type: 'single' },
        ],
      },
      {
        id: 'social',
        title: 'Calls / Accountability',
        color: 'border-amber-200 bg-amber-50',
        items: [
          { id: 'callFriend', title: 'Call a friend (15+ min)', type: 'single' },
          { id: 'callDad', title: 'Call dad (5+ min)', type: 'single' },
          { id: 'noMasturbation', title: 'No masturbation', type: 'single', endOfDay: true },
          { id: 'noMarijuana', title: 'No marijuana', type: 'single', endOfDay: true },
        ],
      },
      {
        id: 'fitness',
        title: 'Workout Tracking',
        color: 'border-emerald-200 bg-emerald-50',
        items: [
          { id: 'workouts', title: 'Workout 1 / 2', type: 'workouts' },
          { id: 'workoutsNotBackToBack', title: 'Workouts were not back-to-back', type: 'single', endOfDay: true },
        ],
      },
      {
        id: 'work',
        title: 'Work Blocks',
        color: 'border-cyan-200 bg-cyan-50',
        items: [
          { id: 'workHours', title: 'Work', type: 'workBlocks' },
        ],
      },
    ];

    const END_OF_DAY_IDS = new Set([
      'noCheatMeals',
      'noAlcohol',
      'noMasturbation',
      'noMarijuana',
      'workoutsNotBackToBack',
    ]);

    function todayString() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function isWeekend(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay();
      return day === 0 || day === 6;
    }

    function workTarget(dateStr) {
      return isWeekend(dateStr) ? 3 : 8;
    }

    function createBlankTasks(dateStr) {
      return {
        water: [false, false, false, false, false],
        noCheatMeals: false,
        noAlcohol: false,
        reading: false,
        progressPic: false,
        language: [false, false, false],
        music: [false, false, false],
        coldShower: false,
        callFriend: false,
        callDad: false,
        noMasturbation: false,
        noMarijuana: false,
        workouts: [
          { done: false, outside: false },
          { done: false, outside: false },
        ],
        workoutsNotBackToBack: false,
        workHours: Array.from({ length: workTarget(dateStr) }, () => false),
      };
    }

    function normalizeTasksForDate(tasks, dateStr) {
      const target = workTarget(dateStr);
      const current = Array.isArray(tasks?.workHours) ? tasks.workHours : [];
      const workHours = Array.from({ length: target }, (_, i) => Boolean(current[i]));
      return {
        ...createBlankTasks(dateStr),
        ...tasks,
        workHours,
      };
    }

    function defaultData() {
      const date = todayString();
      return {
        activeDay: date,
        logs: {
          [date]: {
            date,
            tasks: createBlankTasks(date),
            notes: '',
            failed: false,
          },
        },
        history: [],
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultData();
        const parsed = JSON.parse(raw);
        const date = parsed.activeDay || todayString();
        const logs = parsed.logs || {};
        const existing = logs[date] || { date, tasks: createBlankTasks(date), notes: '', failed: false };
        return {
          activeDay: date,
          logs: {
            ...logs,
            [date]: {
              ...existing,
              tasks: normalizeTasksForDate(existing.tasks, date),
            },
          },
          history: Array.isArray(parsed.history) ? parsed.history : [],
        };
      } catch (e) {
        return defaultData();
      }
    }

    function isArrayComplete(arr) {
      return Array.isArray(arr) && arr.length > 0 && arr.every(Boolean);
    }

    function areWorkoutsComplete(workouts) {
      return Array.isArray(workouts) && workouts.every(w => w.done) && workouts.some(w => w.outside);
    }

    function isTaskComplete(id, value, dateStr) {
      if (id === 'water' || id === 'language' || id === 'music' || id === 'workHours') return isArrayComplete(value);
      if (id === 'workouts') return areWorkoutsComplete(value);
      return value === true;
    }

    function completionCounts(tasks, dateStr) {
      const allIds = [
        'water', 'noCheatMeals', 'noAlcohol', 'reading', 'progressPic',
        'language', 'music', 'coldShower', 'callFriend', 'callDad',
        'noMasturbation', 'noMarijuana', 'workouts', 'workoutsNotBackToBack', 'workHours'
      ];
      const done = allIds.filter(id => isTaskComplete(id, tasks[id], dateStr)).length;
      return { done, total: allIds.length, percent: Math.round((done / allIds.length) * 100) };
    }

    function endOfDayCounts(tasks, dateStr) {
      const ids = Array.from(END_OF_DAY_IDS);
      const done = ids.filter(id => isTaskComplete(id, tasks[id], dateStr)).length;
      return { done, total: ids.length };
    }

    function ActionBox({ checked, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full rounded-lg border px-2 py-2 text-[10px] font-semibold leading-tight transition ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
        >
          {label}
        </button>
      );
    }

    function MultiBoxItem({ title, boxes, boxLabel, values, onToggle }) {
      return (
        <div className="rounded-xl bg-white/85 border border-white p-2 shadow-sm">
          <div className="flex items-center justify-between gap-2 mb-2">
            <div>
              <div className="font-semibold text-xs leading-tight">{title}</div>
              <div className="text-[10px] text-slate-500 leading-tight">{boxLabel}</div>
            </div>
            <div className="text-[10px] font-medium text-slate-500">{values.filter(Boolean).length}/{boxes}</div>
          </div>
          <div className={`grid gap-1 ${boxes <= 5 ? 'grid-cols-5' : 'grid-cols-4'}`}>
            {values.map((checked, idx) => (
              <button
                key={idx}
                onClick={() => onToggle(idx)}
                className={`rounded-lg px-1 py-2 text-[10px] font-bold border ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
              >
                {idx + 1}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function WorkoutItem({ workouts, onToggleDone, onToggleOutside }) {
      return (
        <div className="rounded-xl bg-white/85 border border-white p-2 shadow-sm">
          <div className="flex items-center justify-between gap-2 mb-2">
            <div>
              <div className="font-semibold text-xs leading-tight">Workouts</div>
              <div className="text-[10px] text-slate-500 leading-tight">2 total, at least one outside</div>
            </div>
            <div className="text-[10px] font-medium text-slate-500">
              {workouts.filter(w => w.done).length}/2 done
            </div>
          </div>
          <div className="space-y-2">
            {workouts.map((workout, idx) => (
              <div key={idx} className="rounded-lg border border-slate-200 p-2 bg-slate-50">
                <div className="font-medium text-xs mb-1">Workout {idx + 1}</div>
                <div className="grid grid-cols-2 gap-1">
                  <ActionBox
                    checked={workout.done}
                    label={workout.done ? 'Done' : 'Not done'}
                    onClick={() => onToggleDone(idx)}
                  />
                  <ActionBox
                    checked={workout.outside}
                    label={workout.outside ? 'Outside' : 'Inside'}
                    onClick={() => onToggleOutside(idx)}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SingleItem({ title, checked, subtitle, onClick }) {
      return (
        <div className="rounded-xl bg-white/85 border border-white p-2 shadow-sm">
          <div className="flex items-center justify-between gap-2 mb-2">
            <div>
              <div className="font-semibold text-xs leading-tight">{title}</div>
              {subtitle ? <div className="text-[10px] text-slate-500 leading-tight">{subtitle}</div> : null}
            </div>
          </div>
          <ActionBox checked={checked} label={checked ? 'Done' : 'Open'} onClick={onClick} />
        </div>
      );
    }

    function GroupCard({ group, children }) {
      return (
        <section className={`rounded-2xl border p-2 shadow-sm ${group.color}`}>
          <div className="mb-2">
            <h2 className="text-sm font-bold leading-tight">{group.title}</h2>
          </div>
          <div className="space-y-2">{children}</div>
        </section>
      );
    }

    function App() {
      const [data, setData] = useState(loadData);
      const activeDate = data.activeDay;
      const log = data.logs[activeDate] || { date: activeDate, tasks: createBlankTasks(activeDate), notes: '', failed: false };
      const tasks = useMemo(() => normalizeTasksForDate(log.tasks, activeDate), [log.tasks, activeDate]);
      const stats = completionCounts(tasks, activeDate);
      const eodStats = endOfDayCounts(tasks, activeDate);
      const weekend = isWeekend(activeDate);
      const viewportHeight = typeof window !== 'undefined' ? window.innerHeight : 900;
      const compactScale = viewportHeight < 820 ? 0.82 : viewportHeight < 950 ? 0.9 : 1;

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, [data]);

      function updateCurrentLog(updater) {
        setData(prev => {
          const currentDate = prev.activeDay;
          const currentLog = prev.logs[currentDate] || { date: currentDate, tasks: createBlankTasks(currentDate), notes: '', failed: false };
          const nextLog = updater({
            ...currentLog,
            tasks: normalizeTasksForDate(currentLog.tasks, currentDate),
          });
          return {
            ...prev,
            logs: {
              ...prev.logs,
              [currentDate]: nextLog,
            },
          };
        });
      }

      function toggleArrayItem(id, index) {
        updateCurrentLog(current => {
          const next = [...current.tasks[id]];
          next[index] = !next[index];
          return {
            ...current,
            tasks: {
              ...current.tasks,
              [id]: next,
            },
          };
        });
      }

      function toggleSingle(id) {
        updateCurrentLog(current => ({
          ...current,
          tasks: {
            ...current.tasks,
            [id]: !current.tasks[id],
          },
        }));
      }

      function toggleWorkoutDone(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, done: !w.done } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function toggleWorkoutOutside(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, outside: !w.outside } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function changeDay(delta) {
        setData(prev => {
          const base = new Date(prev.activeDay + 'T12:00:00');
          base.setDate(base.getDate() + delta);
          const nextDate = base.toISOString().slice(0, 10);
          const existing = prev.logs[nextDate];
          return {
            ...prev,
            activeDay: nextDate,
            logs: {
              ...prev.logs,
              [nextDate]: existing || {
                date: nextDate,
                tasks: createBlankTasks(nextDate),
                notes: '',
                failed: false,
              },
            },
          };
        });
      }

      function setManualDate(value) {
        if (!value) return;
        setData(prev => ({
          ...prev,
          activeDay: value,
          logs: {
            ...prev.logs,
            [value]: prev.logs[value] || {
              date: value,
              tasks: createBlankTasks(value),
              notes: '',
              failed: false,
            },
          },
        }));
      }

      function markFailed() {
        const ok = window.confirm('Confirm failure for this day? This is honor-code based and should only be used if you really failed.');
        if (!ok) return;
        updateCurrentLog(current => ({ ...current, failed: true }));
      }

      function unmarkFailed() {
        updateCurrentLog(current => ({ ...current, failed: false }));
      }

      function startNewDay() {
        const ok = window.confirm('Start a new day? This will move you to the next day but will not auto-reset anything.');
        if (!ok) return;
        changeDay(1);
      }

      function clearAll() {
        const ok = window.confirm('Clear all local tracker data?');
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEY);
        setData(defaultData());
      }

      const normalGroups = GROUPS.map(group => ({
        ...group,
        items: group.items.filter(item => !item.endOfDay),
      })).filter(group => group.items.length > 0);

      const endOfDayItems = GROUPS.flatMap(group =>
        group.items.filter(item => item.endOfDay).map(item => ({ ...item, parentTitle: group.title }))
      );

      return (
        <div className="w-screen h-screen overflow-hidden bg-slate-100">
          <div
            className="origin-top-left"
            style={{
              transform: `scale(${compactScale})`,
              width: `${100 / compactScale}%`,
              height: `${100 / compactScale}%`,
            }}
          >
            <div className="max-w-none mx-auto p-2 space-y-2 h-full flex flex-col">
              <header className="rounded-2xl bg-slate-900 text-white p-3 shadow-sm shrink-0">
                <div className="flex flex-col gap-2 lg:flex-row lg:items-end lg:justify-between">
                  <div>
                    <h1 className="text-lg font-bold tracking-tight">75 Hard Dashboard Test</h1>
                    <p className="text-xs text-slate-300 mt-0.5">Tiny one-page view. Zoom the browser to inspect details.</p>
                  </div>
                  <div className="grid grid-cols-5 gap-2 w-full lg:w-auto">
                    <div className="rounded-xl bg-slate-800 px-2 py-2">
                      <div className="text-xs text-slate-400">Date</div>
                      <div className="font-semibold text-xs mt-0.5">{activeDate}</div>
                    </div>
                    <div className="rounded-xl bg-slate-800 px-2 py-2">
                      <div className="text-xs text-slate-400">Day Type</div>
                      <div className="font-semibold text-xs mt-0.5">{weekend ? 'Weekend' : 'Weekday'}</div>
                    </div>
                    <div className="rounded-xl bg-slate-800 px-2 py-2">
                      <div className="text-xs text-slate-400">Work Goal</div>
                      <div className="font-semibold text-xs mt-0.5">{workTarget(activeDate)} hr</div>
                    </div>
                    <div className="rounded-xl bg-slate-800 px-2 py-2">
                      <div className="text-xs text-slate-400">Done</div>
                      <div className="font-semibold text-xs mt-0.5">{stats.done}/{stats.total}</div>
                    </div>
                    <div className={`rounded-xl px-2 py-2 ${log.failed ? 'bg-red-700' : 'bg-slate-800'}`}>
                      <div className="text-xs text-slate-300">Status</div>
                      <div className="font-semibold text-xs mt-0.5">{log.failed ? 'Failed' : `${stats.percent}% complete`}</div>
                    </div>
                  </div>
                </div>
              </header>

              <section className="rounded-2xl bg-white p-3 shadow-sm shrink-0">
                <div className="flex flex-col gap-2 xl:flex-row xl:items-center xl:justify-between">
                  <div className="flex flex-wrap gap-2">
                    <button onClick={() => changeDay(-1)} className="rounded-lg bg-slate-200 px-3 py-2 text-xs font-semibold">Prev</button>
                    <button onClick={() => setManualDate(todayString())} className="rounded-lg bg-slate-200 px-3 py-2 text-xs font-semibold">Today</button>
                    <button onClick={() => changeDay(1)} className="rounded-lg bg-slate-200 px-3 py-2 text-xs font-semibold">Next</button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    <input type="date" value={activeDate} onChange={(e) => setManualDate(e.target.value)} className="rounded-lg border border-slate-300 px-2 py-2 text-xs" />
                    <button onClick={startNewDay} className="rounded-lg bg-blue-600 text-white px-3 py-2 text-xs font-semibold">Start New Day</button>
                    <button onClick={log.failed ? unmarkFailed : markFailed} className={`rounded-lg px-3 py-2 text-xs font-semibold text-white ${log.failed ? 'bg-emerald-600' : 'bg-red-600'}`}>
                      {log.failed ? 'Unmark Failed' : 'Mark Failed'}
                    </button>
                    <button onClick={clearAll} className="rounded-lg bg-slate-900 text-white px-3 py-2 text-xs font-semibold">Clear</button>
                  </div>
                </div>
                <div className="mt-2 text-xs text-slate-600">
                  End-of-day items done: <span className="font-semibold">{eodStats.done}/{eodStats.total}</span>
                </div>
              </section>

              <main className="grid grid-cols-3 gap-2 items-start flex-1 min-h-0 overflow-hidden">
                {normalGroups.map(group => (
                  <GroupCard key={group.id} group={group}>
                    {group.items.map(item => {
                      if (item.type === 'multi') {
                        return (
                          <MultiBoxItem
                            key={item.id}
                            title={item.title}
                            boxes={item.boxes}
                            boxLabel={item.boxLabel}
                            values={tasks[item.id]}
                            onToggle={(idx) => toggleArrayItem(item.id, idx)}
                          />
                        );
                      }
                      if (item.type === 'workouts') {
                        return (
                          <WorkoutItem
                            key={item.id}
                            workouts={tasks.workouts}
                            onToggleDone={toggleWorkoutDone}
                            onToggleOutside={toggleWorkoutOutside}
                          />
                        );
                      }
                      if (item.type === 'workBlocks') {
                        return (
                          <MultiBoxItem
                            key={item.id}
                            title={`Work (${weekend ? 'weekend' : 'weekday'})`}
                            boxes={workTarget(activeDate)}
                            boxLabel="1 hour each"
                            values={tasks.workHours}
                            onToggle={(idx) => toggleArrayItem('workHours', idx)}
                          />
                        );
                      }
                      return (
                        <SingleItem
                          key={item.id}
                          title={item.title}
                          subtitle={item.id === 'callFriend' ? '15+ min' : item.id === 'callDad' ? '5+ min' : ''}
                          checked={tasks[item.id]}
                          onClick={() => toggleSingle(item.id)}
                        />
                      );
                    })}
                  </GroupCard>
                ))}

                <section className="rounded-2xl border border-rose-200 bg-rose-50 p-3 shadow-sm overflow-hidden">
                  <div className="mb-2">
                    <h2 className="text-sm font-bold">End of Day Only</h2>
                    <p className="text-xs text-slate-600">Leave these for the end.</p>
                  </div>
                  <div className="space-y-2">
                    {endOfDayItems.map(item => (
                      <SingleItem
                        key={item.id}
                        title={item.title}
                        subtitle={item.parentTitle}
                        checked={tasks[item.id]}
                        onClick={() => toggleSingle(item.id)}
                      />
                    ))}
                  </div>
                </section>

                <section className="rounded-2xl border border-slate-200 bg-white p-3 shadow-sm overflow-hidden">
                  <div className="mb-2">
                    <h2 className="text-sm font-bold">Notes</h2>
                    <p className="text-xs text-slate-600">Honor-code log.</p>
                  </div>
                  <textarea
                    value={log.notes || ''}
                    onChange={(e) => updateCurrentLog(current => ({ ...current, notes: e.target.value }))}
                    placeholder="Quick notes"
                    className="w-full min-h-[120px] rounded-xl border border-slate-300 px-2 py-2 text-xs"
                  />
                  <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                    <div className="rounded-xl bg-slate-100 p-2">
                      <div className="text-slate-500">Manual day control</div>
                      <div className="font-semibold mt-0.5">Yes</div>
                    </div>
                    <div className="rounded-xl bg-slate-100 p-2">
                      <div className="text-slate-500">Auto midnight reset</div>
                      <div className="font-semibold mt-0.5">No</div>
                    </div>
                  </div>
                </section>
              </main>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
