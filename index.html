
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>PRIVATE BOUNDARY BUILD</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="75 Hard" />
  <meta name="mobile-web-app-capable" content="yes" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgb(241 245 249);
    }
    body {
      overscroll-behavior-y: auto;
      -webkit-tap-highlight-color: transparent;
    }
    #root {
      width: 100%;
      min-height: 100%;
    }
    input, button, textarea, select {
      font: inherit;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const APP_NAME = '81 Hard Tracker';
    const STORAGE_KEY = '81hard_dashboard_v2';
    const BACKUP_KEY = '81hard_dashboard_v2_backup';
    const EXPORT_VERSION = 1;

    const GROUPS = [
      {
        id: 'dailyChecklist',
        title: 'Daily Checklist',
        color: 'border-slate-200 bg-slate-50',
        items: [
          { id: 'reading', title: '10 pages self-help read', type: 'singleRow' },
          { id: 'progressPic', title: 'Daily progress pic', type: 'singleRow' },
          { id: 'language', title: 'Mandarin or Spanish', type: 'singleRow', subtitle: '15+ min total' },
          { id: 'music', title: 'Music practice', type: 'singleRow', subtitle: '30+ min total' },
          { id: 'coldShower', title: 'Cold shower', type: 'singleRow', subtitle: '2+ min at end' },
          { id: 'callFriend', title: 'Call a friend', type: 'singleRow', subtitle: '15+ min' },
          { id: 'callDad', title: 'Call dad', type: 'singleRow', subtitle: '5+ min' },
        ],
      },
    ];

    function todayString() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function isWeekend(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay();
      return day === 0 || day === 6;
    }

    function workTarget(dateStr) {
      return isWeekend(dateStr) ? 3 : 8;
    }

    function createBlankTasks(dateStr) {
      return {
        water: [false, false, false, false, false],
        noCheatMeals: false,
        noAlcohol: false,
        reading: false,
        progressPic: false,
        language: false,
        music: false,
        coldShower: false,
        callFriend: false,
        callDad: false,
        privateBoundary: false,
        noMarijuana: false,
        workouts: [
          { done: false, outside: false },
          { done: false, outside: false },
        ],
        workoutsNotBackToBack: false,
        workHours: Array.from({ length: 8 }, () => false),
      };
    }

    function normalizeTasksForDate(tasks, dateStr) {
      const current = Array.isArray(tasks?.workHours) ? tasks.workHours : [];
      const workHours = Array.from({ length: 8 }, (_, i) => Boolean(current[i]));
      return {
        ...createBlankTasks(dateStr),
        ...tasks,
        workHours,
      };
    }

    function isLogShapeValid(log) {
      return !!log && typeof log === 'object' && typeof log.date === 'string' && typeof log.failed === 'boolean' && !!log.tasks;
    }

    function sanitizeLogs(logs) {
      if (!logs || typeof logs !== 'object') return {};
      const result = {};
      Object.entries(logs).forEach(([date, log]) => {
        if (!isLogShapeValid(log)) return;
        result[date] = {
          date,
          tasks: normalizeTasksForDate(log.tasks, date),
          notes: typeof log.notes === 'string' ? log.notes : '',
          failed: !!log.failed,
        };
      });
      return result;
    }

    function defaultData() {
      const date = todayString();
      return {
        activeDay: date,
        logs: {
          [date]: {
            date,
            tasks: createBlankTasks(date),
            notes: '',
            failed: false,
          },
        },
        history: [],
        challengeStartDate: date,
      };
    }

    function sanitizeData(rawData) {
      const fallback = defaultData();
      if (!rawData || typeof rawData !== 'object') return fallback;

      const activeDay = typeof rawData.activeDay === 'string' ? rawData.activeDay : fallback.activeDay;
      const challengeStartDate = typeof rawData.challengeStartDate === 'string' ? rawData.challengeStartDate : activeDay;
      const logs = sanitizeLogs(rawData.logs);

      if (!logs[activeDay]) {
        logs[activeDay] = {
          date: activeDay,
          tasks: createBlankTasks(activeDay),
          notes: '',
          failed: false,
        };
      }

      return {
        activeDay,
        challengeStartDate,
        logs,
        history: Array.isArray(rawData.history) ? rawData.history : [],
      };
    }

    function saveDataState(data) {
      const payload = JSON.stringify(data);
      localStorage.setItem(STORAGE_KEY, payload);
      localStorage.setItem(BACKUP_KEY, JSON.stringify({ savedAt: new Date().toISOString(), data }));
    }

    function loadData() {
      try {
        const primaryRaw = localStorage.getItem(STORAGE_KEY);
        if (primaryRaw) {
          return sanitizeData(JSON.parse(primaryRaw));
        }
      } catch (e) {}

      try {
        const backupRaw = localStorage.getItem(BACKUP_KEY);
        if (backupRaw) {
          const parsedBackup = JSON.parse(backupRaw);
          if (parsedBackup && parsedBackup.data) {
            return sanitizeData(parsedBackup.data);
          }
        }
      } catch (e) {}

      return defaultData();
    }

    function isArrayComplete(arr) {
      return Array.isArray(arr) && arr.length > 0 && arr.every(Boolean);
    }

    function areWorkoutsComplete(workouts) {
      return Array.isArray(workouts) && workouts.every(w => w.done) && workouts.some(w => w.outside);
    }

    function isTaskComplete(id, value, dateStr) {
      if (id === 'water') return isArrayComplete(value);
      if (id === 'workHours') {
        const required = workTarget(dateStr);
        return Array.isArray(value) && value.slice(0, required).every(Boolean);
      }
      if (id === 'workouts') return areWorkoutsComplete(value);
      return value === true;
    }

    function completionCounts(tasks, dateStr) {
      const allIds = [
        'water', 'noCheatMeals', 'noAlcohol', 'reading', 'progressPic',
        'language', 'music', 'coldShower', 'callFriend', 'callDad',
        'privateBoundary', 'noMarijuana', 'workouts', 'workoutsNotBackToBack', 'workHours'
      ];
      const done = allIds.filter(id => isTaskComplete(id, tasks[id], dateStr)).length;
      return { done, total: allIds.length, percent: Math.round((done / allIds.length) * 100) };
    }

    function isDayCompleted(log) {
      if (!log || log.failed) return false;
      return completionCounts(log.tasks, log.date).done === 15;
    }

    function daysCompletedWithinWindow(logs, challengeStartDate) {
      const start = new Date(challengeStartDate + 'T12:00:00');
      const end = new Date(start);
      end.setDate(start.getDate() + 80);

      return Object.values(logs).filter(log => {
        const d = new Date(log.date + 'T12:00:00');
        return d >= start && d <= end && isDayCompleted(log);
      }).length;
    }

    function buildCalendarDays(challengeStartDate, logs) {
      const start = new Date(challengeStartDate + 'T12:00:00');
      return Array.from({ length: 81 }, (_, idx) => {
        const d = new Date(start);
        d.setDate(start.getDate() + idx);
        const dateStr = d.toISOString().slice(0, 10);
        const log = logs[dateStr];
        return {
          date: dateStr,
          label: `${d.getMonth() + 1}/${d.getDate()}`,
          number: idx + 1,
          completed: !!log && isDayCompleted(log),
          failed: !!log && !!log.failed,
        };
      });
    }

    function runDiagnosticsSuite() {
      const weekday = '2026-04-13';
      const weekend = '2026-04-12';
      const results = [];
      const pass = (name, condition) => results.push({ name, ok: !!condition });

      pass('Weekday work target is 8', workTarget(weekday) === 8);
      pass('Weekend work target is 3', workTarget(weekend) === 3);

      const blankWeekday = createBlankTasks(weekday);
      pass('Blank tasks contain 8 work blocks', Array.isArray(blankWeekday.workHours) && blankWeekday.workHours.length === 8);
      pass('Blank tasks contain 5 water blocks', Array.isArray(blankWeekday.water) && blankWeekday.water.length === 5);

      const normalizedWeekend = normalizeTasksForDate({ workHours: [true, true, true] }, weekend);
      pass('Weekend normalization still preserves 8 total work slots', normalizedWeekend.workHours.length === 8);
      pass('Weekend work completion passes with first 3 checked', isTaskComplete('workHours', [true, true, true, false, false, false, false, false], weekend));
      pass('Weekday work completion fails with only first 3 checked', !isTaskComplete('workHours', [true, true, true, false, false, false, false, false], weekday));

      const workoutComplete = [
        { done: true, outside: true },
        { done: true, outside: false },
      ];
      pass('Workout completion requires both done plus one outside', isTaskComplete('workouts', workoutComplete, weekday));
      pass('Workout completion fails if one workout missing', !isTaskComplete('workouts', [{ done: true, outside: true }, { done: false, outside: false }], weekday));

      const completeLog = {
        date: weekday,
        failed: false,
        tasks: {
          ...createBlankTasks(weekday),
          water: [true, true, true, true, true],
          noCheatMeals: true,
          noAlcohol: true,
          reading: true,
          progressPic: true,
          language: true,
          music: true,
          coldShower: true,
          callFriend: true,
          callDad: true,
          privateBoundary: true,
          noMarijuana: true,
          workouts: workoutComplete,
          workoutsNotBackToBack: true,
          workHours: [true, true, true, true, true, true, true, true],
        },
      };

      pass('Completed log is detected as completed', isDayCompleted(completeLog));
      pass('Sanitizer restores missing fields safely', !!sanitizeData({ activeDay: weekday, logs: { [weekday]: { date: weekday, tasks: {} } } }).logs[weekday]);
      pass('Backup wrapper preserves nested data field', !!sanitizeData({ activeDay: weekday, challengeStartDate: weekday, logs: { [weekday]: completeLog } }).logs[weekday]);

      const failedLog = { ...completeLog, failed: true };
      pass('Failed log is never treated as completed', !isDayCompleted(failedLog));

      const diagnosticsPassed = results.filter(r => r.ok).length;
      const diagnosticsTotal = results.length;
      return { diagnosticsPassed, diagnosticsTotal, results };
    }

    function ActionBox({ checked, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full rounded-md border px-0 py-1.5 text-[6px] font-semibold leading-tight transition ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
        >
          {label}
        </button>
      );
    }

    function MultiBoxItem({ title, boxes, boxLabel, values, onToggle }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-1 mb-1">
            <div>
              <div className="font-semibold text-[10px] leading-tight">{title}</div>
              <div className="text-[8px] text-slate-500 leading-tight">{boxLabel}</div>
            </div>
            <div className="text-[8px] font-medium text-slate-500">{values.filter(Boolean).length}/{boxes}</div>
          </div>
          <div className={`grid gap-1 ${boxes <= 5 ? 'grid-cols-5' : 'grid-cols-4'}`}>
            {values.map((checked, idx) => (
              <button
                key={idx}
                onClick={() => onToggle(idx)}
                className={`rounded-md px-0 py-1.5 text-[6px] font-bold border ${checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
              >
                {idx + 1}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function WorkoutItem({ workouts, notBackToBack, onToggleDone, onToggleOutside, onToggleNotBackToBack }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-2 mb-1">
            <div>
              <div className="font-semibold text-[10px] leading-tight">Workout Tracking</div>
              <div className="text-[8px] text-slate-500 leading-tight">1 row with spacing toggle</div>
            </div>
            <div className="shrink-0 w-10">
              <ActionBox
                checked={notBackToBack}
                label={notBackToBack ? 'Spaced' : 'Spacing'}
                onClick={onToggleNotBackToBack}
              />
            </div>
          </div>
          <div className="grid grid-cols-[1fr_1fr_0.18fr_1fr_1fr] gap-1 items-stretch">
            <ActionBox
              checked={workouts[0].done}
              label="Workout 1"
              onClick={() => onToggleDone(0)}
            />
            <ActionBox
              checked={workouts[0].outside}
              label="Out 1"
              onClick={() => onToggleOutside(0)}
            />
            <div></div>
            <ActionBox
              checked={workouts[1].done}
              label="Workout 2"
              onClick={() => onToggleDone(1)}
            />
            <ActionBox
              checked={workouts[1].outside}
              label="Out 2"
              onClick={() => onToggleOutside(1)}
            />
          </div>
        </div>
      );
    }

    function GuardrailsGrid({ tasks, onToggle }) {
      const items = [
        { id: 'noCheatMeals', title: 'No cheats' },
        { id: 'noAlcohol', title: 'No alc' },
        { id: 'privateBoundary', title: 'Private' },
        { id: 'noMarijuana', title: 'No weed' },
      ];

      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="mb-1">
            <div className="font-semibold text-[10px] leading-tight">Daily Guardrails</div>
            <div className="text-[8px] text-slate-500 leading-tight">1 x 4</div>
          </div>
          <div className="grid grid-cols-4 gap-1">
            {items.map(item => (
              <ActionBox
                key={item.id}
                checked={tasks[item.id]}
                label={item.title}
                onClick={() => onToggle(item.id)}
              />
            ))}
          </div>
        </div>
      );
    }

    function WorkBlocksGrid({ values, weekend, onToggle }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-1 mb-1">
            <div>
              <div className="font-semibold text-[10px] leading-tight">Work Blocks</div>
              <div className="text-[8px] text-slate-500 leading-tight">4 across, 2 down</div>
            </div>
            <div className="text-[8px] font-medium text-slate-500">{weekend ? 'Weekend' : 'Weekday'}</div>
          </div>
          <div className="grid grid-cols-4 gap-1">
            {values.map((checked, idx) => {
              const disabled = weekend && idx >= 3;
              return (
                <button
                  key={idx}
                  onClick={() => !disabled && onToggle(idx)}
                  className={`rounded-md px-0 py-1.5 text-[6px] font-bold border ${disabled ? 'bg-slate-200 border-slate-200 text-slate-400 cursor-not-allowed' : checked ? 'bg-green-600 border-green-600 text-white' : 'bg-red-600 border-red-600 text-white'}`}
                >
                  {idx + 1}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function SingleItem({ title, checked, subtitle, onClick }) {
      return (
        <div className="rounded-lg bg-white/90 border border-white p-1.5 shadow-sm">
          <div className="flex items-center justify-between gap-2">
            <div className="min-w-0 pr-2">
              <div className="font-semibold text-[10px] leading-tight">{title}</div>
              {subtitle ? <div className="text-[8px] text-slate-500 leading-tight">{subtitle}</div> : null}
            </div>
            <div className="shrink-0 w-8">
              <ActionBox checked={checked} label={checked ? 'Done' : 'Open'} onClick={onClick} />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(loadData);
      const [diagnostics, setDiagnostics] = useState(null);
      const [view, setView] = useState('dashboard');
      const importInputRef = useRef(null);
      const activeDate = data.activeDay;
      const log = data.logs[activeDate] || { date: activeDate, tasks: createBlankTasks(activeDate), notes: '', failed: false };
      const tasks = useMemo(() => normalizeTasksForDate(log.tasks, activeDate), [log.tasks, activeDate]);
      const stats = completionCounts(tasks, activeDate);
      const weekend = isWeekend(activeDate);
      const completedDays = daysCompletedWithinWindow(data.logs, data.challengeStartDate);
      const calendarDays = buildCalendarDays(data.challengeStartDate, data.logs);

      useEffect(() => {
        saveDataState(data);
      }, [data]);

      function updateCurrentLog(updater) {
        setData(prev => {
          const currentDate = prev.activeDay;
          const currentLog = prev.logs[currentDate] || { date: currentDate, tasks: createBlankTasks(currentDate), notes: '', failed: false };
          const nextLog = updater({
            ...currentLog,
            tasks: normalizeTasksForDate(currentLog.tasks, currentDate),
          });
          return {
            ...prev,
            logs: {
              ...prev.logs,
              [currentDate]: nextLog,
            },
          };
        });
      }

      function toggleArrayItem(id, index) {
        updateCurrentLog(current => {
          const next = [...current.tasks[id]];
          next[index] = !next[index];
          return {
            ...current,
            tasks: {
              ...current.tasks,
              [id]: next,
            },
          };
        });
      }

      function toggleSingle(id) {
        updateCurrentLog(current => ({
          ...current,
          tasks: {
            ...current.tasks,
            [id]: !current.tasks[id],
          },
        }));
      }

      function toggleWorkoutDone(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, done: !w.done } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function toggleWorkoutOutside(index) {
        updateCurrentLog(current => {
          const next = current.tasks.workouts.map((w, i) => i === index ? { ...w, outside: !w.outside } : w);
          return {
            ...current,
            tasks: {
              ...current.tasks,
              workouts: next,
            },
          };
        });
      }

      function changeDay(delta) {
        setData(prev => {
          const base = new Date(prev.activeDay + 'T12:00:00');
          base.setDate(base.getDate() + delta);
          const nextDate = base.toISOString().slice(0, 10);
          const existing = prev.logs[nextDate];
          return {
            ...prev,
            activeDay: nextDate,
            logs: {
              ...prev.logs,
              [nextDate]: existing || {
                date: nextDate,
                tasks: createBlankTasks(nextDate),
                notes: '',
                failed: false,
              },
            },
          };
        });
      }

      function setManualDate(value) {
        if (!value) return;
        setData(prev => ({
          ...prev,
          activeDay: value,
          logs: {
            ...prev.logs,
            [value]: prev.logs[value] || {
              date: value,
              tasks: createBlankTasks(value),
              notes: '',
              failed: false,
            },
          },
        }));
      }

      function markFailed() {
        const ok = window.confirm('Confirm failure for this day? This is honor-code based and should only be used if you really failed.');
        if (!ok) return;
        updateCurrentLog(current => ({ ...current, failed: true }));
      }

      function unmarkFailed() {
        updateCurrentLog(current => ({ ...current, failed: false }));
      }

      function startNewDay() {
        const ok = window.confirm('Start a new day? This will move you to the next day but will not auto-reset anything.');
        if (!ok) return;
        changeDay(1);
      }

      function clearAll() {
        const ok = window.confirm('Clear all local tracker data?');
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(BACKUP_KEY);
        setData(defaultData());
        setDiagnostics(null);
      }

      function exportBackup() {
        const exportPayload = {
          appName: APP_NAME,
          exportVersion: EXPORT_VERSION,
          exportedAt: new Date().toISOString(),
          data,
        };
        const blob = new Blob([JSON.stringify(exportPayload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `81-hard-backup-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      function promptImport() {
        if (importInputRef.current) {
          importInputRef.current.value = '';
          importInputRef.current.click();
        }
      }

      function handleImport(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            const importedData = sanitizeData(parsed.data ? parsed.data : parsed);
            const ok = window.confirm('Import this backup and replace current local data?');
            if (!ok) return;
            setData(importedData);
            setDiagnostics(null);
          } catch (error) {
            alert('Import failed: JSON file is invalid or not in the expected format.');
          }
        };
        reader.readAsText(file);
      }

      function runDiagnostics() {
        setDiagnostics(runDiagnosticsSuite());
      }

      return (
        <div className="w-full min-h-screen bg-slate-100 p-1.5 space-y-1.5 overflow-y-auto">
          <header className="rounded-xl bg-slate-900 text-white p-2 shadow-sm">
            <div className="flex flex-col gap-1">
              <div>
                <h1 className="text-[13px] font-bold tracking-tight">81 Hard Tracker</h1>
                <p className="text-[9px] text-slate-300 mt-0.5">Tiny portrait dashboard. Phone can scroll if needed.</p>
              </div>
              <div className="grid grid-cols-6 gap-1">
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Date</div>
                  <div className="font-semibold text-[10px] mt-0.5 break-all">{activeDate}</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Type</div>
                  <div className="font-semibold text-[10px] mt-0.5">{weekend ? 'Weekend' : 'Weekday'}</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Work</div>
                  <div className="font-semibold text-[10px] mt-0.5">{workTarget(activeDate)} hr</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Completed</div>
                  <div className="font-semibold text-[10px] mt-0.5">{completedDays}/81</div>
                </div>
                <div className="rounded-lg bg-slate-800 px-1.5 py-1.5">
                  <div className="text-[8px] text-slate-400">Done</div>
                  <div className="font-semibold text-[10px] mt-0.5">{stats.done}/{stats.total}</div>
                </div>
                <div className={`rounded-lg px-1.5 py-1.5 ${log.failed ? 'bg-red-700' : 'bg-slate-800'}`}>
                  <div className="text-[8px] text-slate-300">Status</div>
                  <div className="font-semibold text-[10px] mt-0.5">{log.failed ? 'Failed' : `${stats.percent}%`}</div>
                </div>
              </div>
            </div>
          </header>

          <section className="rounded-xl bg-white p-2 shadow-sm">
            <div className="grid grid-cols-4 gap-1 items-center">
              <button onClick={() => changeDay(-1)} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Prev</button>
              <button onClick={() => setManualDate(todayString())} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Today</button>
              <button onClick={() => changeDay(1)} className="rounded-md bg-slate-200 px-2 py-1.5 text-[9px] font-semibold">Next</button>
              <input type="date" value={activeDate} onChange={(e) => setManualDate(e.target.value)} className="rounded-md border border-slate-300 px-1.5 py-1.5 text-[9px] w-full min-w-0" />
            </div>
            <div className="grid grid-cols-3 gap-1 mt-1">
              <button onClick={startNewDay} className="rounded-md bg-blue-600 text-white px-2 py-1.5 text-[9px] font-semibold">New Day</button>
              <button onClick={log.failed ? unmarkFailed : markFailed} className={`rounded-md px-2 py-1.5 text-[9px] font-semibold text-white ${log.failed ? 'bg-emerald-600' : 'bg-red-600'}`}>
                {log.failed ? 'Unfail' : 'Fail'}
              </button>
              <button onClick={clearAll} className="rounded-md bg-slate-900 text-white px-2 py-1.5 text-[9px] font-semibold">Clear</button>
            </div>
            <div className="grid grid-cols-5 gap-1 mt-1">
              <button onClick={() => setView('dashboard')} className={`rounded-md px-2 py-1.5 text-[9px] font-semibold ${view === 'dashboard' ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-900'}`}>Dashboard</button>
              <button onClick={() => setView('calendar')} className={`rounded-md px-2 py-1.5 text-[9px] font-semibold ${view === 'calendar' ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-900'}`}>Calendar</button>
              <button onClick={exportBackup} className="rounded-md bg-emerald-700 text-white px-2 py-1.5 text-[9px] font-semibold">Export JSON</button>
              <button onClick={promptImport} className="rounded-md bg-violet-700 text-white px-2 py-1.5 text-[9px] font-semibold">Import JSON</button>
              <button onClick={runDiagnostics} className="rounded-md bg-amber-600 text-white px-2 py-1.5 text-[9px] font-semibold">Run Tests</button>
            </div>
            <input ref={importInputRef} type="file" accept="application/json" className="hidden" onChange={handleImport} />
            <div className="mt-1 text-[9px] text-slate-600">
              Backups: local primary + local backup mirror + manual JSON export/import
            </div>
            {diagnostics ? (
              <div className="mt-1 rounded-lg border border-slate-200 bg-slate-50 p-1.5 text-[8px] text-slate-700">
                <div className="font-semibold">Diagnostics: {diagnostics.diagnosticsPassed}/{diagnostics.diagnosticsTotal} passed</div>
                <div className="mt-1 grid grid-cols-2 gap-1">
                  {diagnostics.results.map(result => (
                    <div key={result.name} className={`rounded-sm px-1 py-1 ${result.ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                      {result.ok ? 'PASS' : 'FAIL'} · {result.name}
                    </div>
                  ))}
                </div>
              </div>
            ) : null}
          </section>

          {view === 'dashboard' ? (
            <main className="grid grid-cols-3 gap-1.5 items-start">
              <section className="col-span-1 rounded-xl border border-slate-200 bg-slate-50 p-1.5 shadow-sm">
                <div className="mb-1">
                  <h2 className="text-[11px] font-bold leading-tight">Daily Checklist</h2>
                  <p className="text-[8px] text-slate-500 leading-tight">7 rows</p>
                </div>
                <div className="space-y-1">
                  {GROUPS[0].items.map(item => (
                    <SingleItem
                      key={item.id}
                      title={item.title}
                      subtitle={item.subtitle || ''}
                      checked={tasks[item.id]}
                      onClick={() => toggleSingle(item.id)}
                    />
                  ))}
                </div>
              </section>

              <section className="col-span-2 grid grid-cols-1 gap-1.5">
                <div className="rounded-xl border border-blue-200 bg-blue-50 p-1.5 shadow-sm">
                  <div className="mb-1">
                    <h2 className="text-[11px] font-bold leading-tight">Hydration</h2>
                  </div>
                  <MultiBoxItem
                    title="Water"
                    boxes={5}
                    boxLabel=".8L each"
                    values={tasks.water}
                    onToggle={(idx) => toggleArrayItem('water', idx)}
                  />
                </div>

                <div className="rounded-xl border border-cyan-200 bg-cyan-50 p-1.5 shadow-sm">
                  <WorkBlocksGrid
                    values={tasks.workHours}
                    weekend={weekend}
                    onToggle={(idx) => toggleArrayItem('workHours', idx)}
                  />
                </div>

                <div className="rounded-xl border border-rose-200 bg-rose-50 p-1.5 shadow-sm">
                  <GuardrailsGrid tasks={tasks} onToggle={toggleSingle} />
                </div>

                <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-1.5 shadow-sm">
                  <WorkoutItem
                    workouts={tasks.workouts}
                    notBackToBack={tasks.workoutsNotBackToBack}
                    onToggleDone={toggleWorkoutDone}
                    onToggleOutside={toggleWorkoutOutside}
                    onToggleNotBackToBack={() => toggleSingle('workoutsNotBackToBack')}
                  />
                </div>
              </section>
            </main>
          ) : (
            <section className="rounded-xl border border-slate-200 bg-white p-1.5 shadow-sm">
              <div className="mb-1 flex items-center justify-between gap-2">
                <div>
                  <h2 className="text-[11px] font-bold leading-tight">81-Day Calendar</h2>
                  <p className="text-[8px] text-slate-500 leading-tight">Green = completed day number, red = failed day 0</p>
                </div>
                <button onClick={() => setView('dashboard')} className="rounded-md bg-slate-900 text-white px-2 py-1.5 text-[9px] font-semibold">Back</button>
              </div>
              <div className="grid grid-cols-7 gap-1">
                {calendarDays.map(day => (
                  <button
                    key={day.date}
                    onClick={() => {
                      setManualDate(day.date);
                      setView('dashboard');
                    }}
                    className="rounded-md border border-slate-200 bg-slate-50 p-1 text-left"
                  >
                    <div className="text-[6px] text-slate-500 leading-tight">{day.label}</div>
                    <div className={`mt-0.5 rounded-sm px-0.5 py-1 text-center text-[7px] font-bold ${day.completed ? 'bg-green-600 text-white' : day.failed ? 'bg-red-600 text-white' : 'bg-slate-200 text-slate-500'}`}>
                      {day.completed ? day.number : day.failed ? 0 : day.number}
                    </div>
                  </button>
                ))}
              </div>
            </section>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
